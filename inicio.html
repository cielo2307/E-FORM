<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Degradado azul claro a azul oscuro */
      background: linear-gradient(135deg, #4facfe, #1e3c72);
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
      width: 300px;
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-bottom: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    .login-box a {
      display: block;
      margin: 10px 0;
      font-size: 14px;
      color: #1e3c72;
      text-decoration: none;
    }

    .login-box a:hover {
      text-decoration: underline;
    }

    .login-box button {
      background: #1e3c72; /* Azul oscuro */
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    .login-box button:hover {
      background: #274b8a;
    }

    /* Botón para volver al inicio */
    .btn-inicio {
      position: absolute;
      top: 20px;
      left: 20px;
      background: transparent;
      color: #ffffff;
      border: 2px solid rgba(255, 255, 255, 0.85);
      padding: 10px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .btn-inicio:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #ffffff;
    }
  </style>
</head>
<body>
  <a href="index.html" class="btn-inicio">Inicio</a>
  <div class="login-box">
    <h2>Inicio de sesión</h2>
    <input type="text" placeholder="Nombre de usuario">
    <input type="password" placeholder="Contraseña">
    <a href="#">¿Olvidó su contraseña?</a>
    <button>Iniciar</button>
    <div class="registro">
      <a href="#">Quiero hacer el registro</a>
    </div>
  </div>
</body>
</html>
